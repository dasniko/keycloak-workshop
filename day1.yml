include:
  - commons.yml

services:
  keycloak:
    image: keycloak-workshop
    build: .
    pull_policy: build
    command: start --optimized
    environment:
      # tbc...
    volumes:
      - ./certs:/opt/keycloak/certs:ro
    init: true
    deploy:
      replicas: 2
    labels:
      - "traefik.enable=true"
      # HTTP router (plain HTTP frontend → HTTPS backend)
      - "traefik.http.routers.keycloak-web.rule=PathPrefix(`/`)"
      - "traefik.http.routers.keycloak-web.entrypoints=web"
      - "traefik.http.routers.keycloak-web.service=keycloak-svc"
      # HTTPS router (TLS frontend → HTTPS backend)
      - "traefik.http.routers.keycloak-tls.rule=PathPrefix(`/`)"
      - "traefik.http.routers.keycloak-tls.entrypoints=websecure"
      - "traefik.http.routers.keycloak-tls.service=keycloak-svc"
      - "traefik.http.routers.keycloak-tls.tls=true"
      # Service: HTTPS backend with verified TLS, cookie-based sticky sessions
      - "traefik.http.services.keycloak-svc.loadbalancer.server.port=8443"
      - "traefik.http.services.keycloak-svc.loadbalancer.server.scheme=https"
      - "traefik.http.services.keycloak-svc.loadbalancer.serversTransport=keycloak-transport@file"
      - "traefik.http.services.keycloak-svc.loadbalancer.sticky.cookie=true"
      - "traefik.http.services.keycloak-svc.loadbalancer.sticky.cookie.name=TRAEFIK_STICKY"
      - "traefik.http.services.keycloak-svc.loadbalancer.sticky.cookie.secure=true"
      - "traefik.http.services.keycloak-svc.loadbalancer.sticky.cookie.httpOnly=true"
      # Health check on Keycloak management port
      - "traefik.http.services.keycloak-svc.loadbalancer.healthcheck.path=/health/ready"
      - "traefik.http.services.keycloak-svc.loadbalancer.healthcheck.port=9000"
      - "traefik.http.services.keycloak-svc.loadbalancer.healthcheck.scheme=https"
      - "traefik.http.services.keycloak-svc.loadbalancer.healthcheck.interval=10s"
      - "traefik.http.services.keycloak-svc.loadbalancer.healthcheck.timeout=5s"
    networks:
      - kc
    depends_on:
      postgres:
        condition: service_healthy

  jaeger:
    image: docker.io/jaegertracing/all-in-one:latest
    command: --log-level=error
    ports:
      - "16686:16686"
    volumes:
      - jaeger-tmp:/tmp
    networks:
      - kc
